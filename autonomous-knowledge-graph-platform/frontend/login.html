<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Knowledge Graph Platform</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="auth-page">
  <main class="auth-shell compact">
    <section class="auth-card">
      <h1>Enterprise Login</h1>
      <form id="loginForm">
        <label>Email<input name="email" type="email" required></label>
        <label>Password<input name="password" type="password" required></label>
        <button type="submit">Sign in</button>
      </form>
      <p class="muted auth-links">New user? <a href="signup.html">Create account</a></p>
    </section>
  </main>
  <script src="assets/js/api_service.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
